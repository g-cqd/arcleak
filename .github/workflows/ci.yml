name: CI

on:
  push:
    branches: [main]
  pull_request:

# Toolchain note: the package requires swift-tools 6.4. The REQUIRED gate is
# the Linux job (nightly-6.4.x container has the toolchain). The macOS job is
# informational until 6.4 GA reaches hosted runners — flip continue-on-error
# off then. Scripts/ci-local.sh runs the full gate on a 6.4 machine.
jobs:
  macos:
    runs-on: macos-15
    # Pending 6.4 GA on hosted runners (stock Xcode cannot parse tools 6.4).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Select newest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
      - name: Build (warnings are errors via package settings)
        run: swift build --build-tests
      - name: Tests (fixture corpus gates FP and FN both ways)
        run: swift test
      - name: Self-dogfood
        run: swift run arcleak analyze Sources --strict --no-cache
      - name: Runtime ground-truth oracle
        run: Scripts/run-leak-oracle.sh "$(swift build --show-bin-path)/leak-oracle"

  linux:
    runs-on: ubuntu-latest
    container: swiftlang/swift:nightly-6.4.x-jammy
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build --build-tests
      - name: Tests
        run: swift test

  format:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: swift-format lint
        run: Scripts/lint-format.sh
      - name: GCD prohibition
        run: Scripts/no-gcd.sh

  benchmarks:
    runs-on: macos-15
    # Informational: thresholds compare against committed baselines.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Benchmark against baseline
        run: swift package --package-path Benchmarks benchmark baseline check local || true
