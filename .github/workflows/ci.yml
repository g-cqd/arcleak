name: CI

on:
  push:
    branches: [main]
  pull_request:

# A push supersedes any still-running CI for the same ref: cancel it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# The package requires swift-tools 6.4, which no *released* toolchain ships
# yet — so both lanes run a nightly 6.4 toolchain. The REQUIRED gate is the
# Linux job (its container IS the toolchain, no bootstrap). The macOS lane
# bootstraps a nightly via swiftly for the Darwin-only coverage (runtime leak
# oracle, SILGen confirmation) and is informational until 6.4 GA.
jobs:
  linux:
    runs-on: ubuntu-latest
    container: swiftlang/swift:nightly-6.4.x-jammy
    # Hard bound on the whole job, post-run cleanup included.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          # CI never pushes; skipping the credential write also makes
          # checkout's post-run cleanup (its only job) a no-op.
          persist-credentials: false
      - name: Build (warnings are errors via package settings)
        run: swift build --build-tests
      - name: Tests
        # --no-parallel: the nightly Linux concurrency runtime has crashed under
        # swift-testing's parallel executor; serial is stable and fast enough.
        run: swift test --no-parallel
      - name: Self-dogfood
        run: swift run arcleak analyze Sources --strict --no-cache
      - name: swift-format lint
        run: Scripts/lint-format.sh
      - name: GCD prohibition
        run: Scripts/no-gcd.sh
      - name: Release binary
        # Dynamic link — the nightly container's static-stdlib SDK does not
        # link. Portability comes from SwiftPM's $ORIGIN rpath: the release
        # workflow bundles the runtime .so files next to the binary.
        run: |
          swift build -c release
          BIN="$(swift build -c release --show-bin-path)/arcleak"
          "$BIN" --version
          cp "$BIN" arcleak
      - uses: actions/upload-artifact@v4
        with:
          name: arcleak-${{ github.sha }}-linux-x86_64
          path: arcleak
          retention-days: 14

  macos:
    runs-on: macos-15
    # Informational until 6.4 GA reaches Xcode.
    continue-on-error: true
    # Post-run stall, root-caused across four hung runs: every wedge sat at
    # the first step boundary after the leak-oracle step, with all steps
    # green and fast, and the hung jobs never uploaded logs. Signature: an
    # orphaned child (oracle/toolchain descendant) inherits the runner's log
    # pipe; the runner waits for pipe EOF to finalize steps and upload logs,
    # so one survivor wedges everything AFTER its step — a late reaper step
    # can run but its own completion never registers (observed live).
    # Countermeasure: pipe isolation. Child-spawning steps write to FILES
    # (children then hold file fds, which cannot wedge pipe-EOF waits) and
    # cat the file afterward. The census step then safely names and kills
    # survivors on the now-unwedgeable log pipe.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Install nightly Swift (swiftly)
        timeout-minutes: 10
        run: |
          curl -fsSL -o swiftly.pkg https://download.swift.org/swiftly/darwin/swiftly.pkg
          installer -pkg swiftly.pkg -target CurrentUserHomeDirectory
          "$HOME/.swiftly/bin/swiftly" init --assume-yes --skip-install --quiet-shell-followup || true
          "$HOME/.swiftly/bin/swiftly" install main-snapshot --use --assume-yes
          echo "$HOME/.swiftly/bin" >> "$GITHUB_PATH"
      - name: Version
        run: swift --version
      - name: Build & test
        timeout-minutes: 15
        run: |
          set +e
          { swift build --build-tests && swift test --no-parallel; } > build-test.log 2>&1 < /dev/null
          status=$?
          cat build-test.log
          exit $status
      - name: Runtime ground-truth oracle
        # The script bounds every scenario in its own process group and
        # self-reaps before exiting (nightly runtimes race an exit-teardown
        # deadlock under `leaks -atExit`); worst case is scenarios × 30 s.
        timeout-minutes: 12
        run: |
          set +e
          Scripts/run-leak-oracle.sh "$(swift build --show-bin-path)/leak-oracle" > oracle.log 2>&1 < /dev/null
          status=$?
          cat oracle.log
          exit $status
      - name: Release binary
        run: |
          set +e
          swift build -c release > release-build.log 2>&1 < /dev/null
          status=$?
          cat release-build.log
          [ $status -ne 0 ] && exit $status
          cp "$(swift build -c release --show-bin-path)/arcleak" arcleak
      - uses: actions/upload-artifact@v4
        with:
          name: arcleak-${{ github.sha }}-macos-arm64
          path: arcleak
          retention-days: 14
      - name: Straggler census and reap
        # Prior steps' children hold file fds, not the log pipe, so this step
        # can finalize — its output names the orphan for future tightening.
        if: always()
        run: |
          echo "toolchain processes still alive:"
          pgrep -fl 'swift|leaks|leak-oracle|xctest|SourceKitService|sourcekit-lsp' || echo "(none)"
          for pattern in swift-frontend swift-driver swift-build swift-package swift-test swift-testing swiftpm-testing-helper xctest SourceKitService sourcekit-lsp leak-oracle leaks; do
            pkill -9 -f "$pattern" 2>/dev/null || true
          done
          exit 0
