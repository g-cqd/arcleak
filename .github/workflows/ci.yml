name: CI

on:
  push:
    branches: [main]
  pull_request:

# A push supersedes any still-running CI for the same ref: cancel it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# The package requires swift-tools 6.4, which no *released* toolchain ships
# yet — the gate is the Linux job, whose nightly container IS the toolchain
# (no bootstrap). There is deliberately NO macOS lane until 6.4 GA reaches
# Xcode: the swiftly nightly bootstrap left orphaned child processes holding
# the runner's log pipes, so the job's post-run phase hung on every run.
# Darwin-only coverage (runtime leak oracle, SILGen confirmation) runs in
# Scripts/ci-local.sh on developer machines instead.
jobs:
  linux:
    runs-on: ubuntu-latest
    container: swiftlang/swift:nightly-6.4.x-jammy
    # Hard bound on the whole job, post-run cleanup included.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          # CI never pushes; skipping the credential write also makes
          # checkout's post-run cleanup (its only job) a no-op.
          persist-credentials: false
      - name: Build (warnings are errors via package settings)
        run: swift build --build-tests
      - name: Tests
        # --no-parallel: the nightly Linux concurrency runtime has crashed under
        # swift-testing's parallel executor; serial is stable and fast enough.
        run: swift test --no-parallel
      - name: Self-dogfood
        run: swift run arcleak analyze Sources --strict --no-cache
      - name: swift-format lint
        run: Scripts/lint-format.sh
      - name: GCD prohibition
        run: Scripts/no-gcd.sh
